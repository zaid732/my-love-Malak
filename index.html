<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لأحلى ملك</title>
    <style>
        body { background-color: #ffe5ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; direction: rtl; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(251, 111, 146, 0.3); text-align: center; width: 320px; display: none; border: 3px solid #ffb3c1; }
        .container.active { display: block; }
        img { width: 160px; height: 160px; margin-bottom: 15px; border-radius: 15px; }
        button { background-color: #ff758f; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 16px; }
        .btn-row { display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container active" id="step-1">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3ZqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif" alt="Welcome">
    <h2>هلو ملك</h2>
    <button onclick="nextStep(2)">هلوو</button>
</div>

<div class="container" id="step-2">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3ZqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/12PA1eJ8Lz064g/giphy.gif" alt="Shy">
    <h2>ملك عندي سؤال بس مستحي اقلك اياه 🫣</h2>
    <button onclick="nextStep(3)">اسألني</button>
</div>

<div class="container" id="step-3">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3ZqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTjJp8whYyGzrq/giphy.gif" alt="Ask">
    <h2>بتحبي زيد او لا؟</h2>
    <div class="btn-row">
        <button onclick="nextStep(4)">مدري</button>
        <button onclick="alert('ايشش هااا؟ 🤨')">شنو هاا؟ 🤨</button>
    </div>
</div>

<div class="container" id="step-4">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3ZqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/oFeUVZfiuGqR5q2q1p/giphy.gif" alt="Love">
    <h2>اذا بتحبي زيد اكبسي على القلب 🥹👉🏻</h2>
    <button style="font-size: 30px;" onclick="nextStep(5)">❤️</button>
</div>

<div class="container" id="step-5">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3ZqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqZndqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/MDJ9IbxxvDUQM/giphy.gif" alt="Dance">
    <h2>كل عام وانتي اقرب انسانة لقلبي و ادعي لحالك دايما بالفرح لان انا فرحي لما اشوف ضحكتك و اشوفك مبسوطة 💖</h2>
    <audio id="audio" controls autoplay src="https://dl.musicdel.ir/Music/1402/09/Nancy%20Ajram%20-%20Ya%20Kethar.mp3"></audio>
</div>

<script>
    function nextStep(s) {
        document.querySelector('.container.active').classList.remove('active');
        document.getElementById('step-'+s).classList.add('active');
    }
</script>
</body>
</html>
